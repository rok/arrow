name: "Workflow label bot"
on:
  workflow_run:
    workflows: ["PR Trigger", "Label when reviewed"]
    types: ['completed']

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-workflow-bot-job:
    name: "PR Workflow bot"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: 'Download payload artifact'
        id: 'download'
        uses: actions/github-script@v8
        with:
          script: |
            const run_id = "${{ github.event.workflow_run.id }}";
            let artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id,
            });
            // "Label when reviewed" uploads pr_review_payload,
            // "PR Trigger" uploads pr_event_payload
            let artifact = artifacts.data.artifacts.find(
              a => a.name === "pr_review_payload"
            );
            let event_name = "pull_request_review";
            if (!artifact) {
              artifact = artifacts.data.artifacts.find(
                a => a.name === "pr_event_payload"
              );
              event_name = "pull_request";
            }
            if (!artifact) {
              core.setFailed("No payload artifact found");
              return;
            }
            core.setOutput("event_name", event_name);
            let download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            var fs = require('fs');
            fs.writeFileSync(
              '${{github.workspace}}/payload.zip',
              Buffer.from(download.data)
            );
      - name: Extract artifact
        id: extract
        run: |
          mkdir -p payload_dir
          unzip payload.zip -d payload_dir
          echo "pr_review_path=$(pwd)/payload_dir/event.json" >> $GITHUB_OUTPUT
      - name: Download committers file
        id: committers
        run: |
          url="https://raw.githubusercontent.com/apache/arrow-site/main/_data/committers.yml"
          curl -sL -o committers.yml $url
          echo "committers_path=$(pwd)/committers.yml" >> $GITHUB_OUTPUT
      - name: Checkout Arrow
        uses: actions/checkout@v6
        with:
          path: arrow
          repository: apache/arrow
          ref: main
          persist-credentials: false
          # fetch the tags for version number generation
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
      - name: Install Archery and Crossbow dependencies
        run: pip install -e arrow/dev/archery[bot]
      - name: Handle PR workflow event
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          archery trigger-bot \
            --event-name "${{ steps.download.outputs.event_name }}" \
            --event-payload "${{ steps.extract.outputs.pr_review_path }}" \
            --committers-file "${{ steps.committers.outputs.committers_path }}"
